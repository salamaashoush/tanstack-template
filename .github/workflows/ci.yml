name: CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_COLOR: 3
  # Node 24 is the active LTS. Keep in step with the Dockerfile.
  NODE_VERSION: 24

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup
        uses: ./.github/setup
      - name: Lint
        run: bun run lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup
        uses: ./.github/setup
      - name: Format
        run: bun run format

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup
        uses: ./.github/setup
      - name: Typecheck
        run: bun run type-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup
        uses: ./.github/setup
      - name: Test
        run: bun run test

  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup
        uses: ./.github/setup

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun run test:e2e:install

      # There is no .env in CI (the setup script that writes one is skipped there),
      # and the server refuses to start without a valid environment -- see
      # src/server/preflight.ts. Supply it the way a deployment would.
      - name: Configure the test environment
        run: |
          echo "API_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "SESSION_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      # The webServer in playwright.config.ts builds and serves the app, so this
      # exercises the production bundle, not the dev server.
      - name: Run Playwright tests
        run: bun run test:e2e

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: tanstack-template:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # A misconfigured container must refuse to start, not boot and 500. Easy to
      # regress silently, so assert it.
      - name: A missing SESSION_SECRET must abort the boot
        run: |
          if docker run --rm -e API_URL=http://localhost:3000 tanstack-template:ci; then
            echo "::error::container booted without SESSION_SECRET -- preflight is not running"
            exit 1
          fi

      # A built image proves nothing; a serving one does.
      - name: Smoke-test the image
        run: |
          docker run -d --name app -p 3000:3000 \
            -e API_URL=http://localhost:3000 \
            -e SESSION_SECRET="$(openssl rand -base64 32)" \
            tanstack-template:ci

          for i in $(seq 1 60); do
            curl -fsS http://localhost:3000/api/health >/dev/null 2>&1 && break
            sleep 1
          done

          curl -fsS http://localhost:3000/api/health | grep -q '"status":"ok"'
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/sign-in)" = "200"

      - name: Container logs
        if: failure()
        run: docker logs app
