name: "Setup and install"
description: "Common setup steps for Actions"

runs:
  using: composite
  steps:
    # setup-bun picks the version up from the "packageManager" field, but it does
    # NOT install Node -- vite, vitest and playwright all execute on Node via
    # their shebangs, so both runtimes are needed.
    - uses: oven-sh/setup-bun@v2

    - name: Use Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    # setup-bun caches only the bun executable, not the dependency store.
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: ${{ runner.os }}-bun-

    - shell: bash
      run: bun install --frozen-lockfile
